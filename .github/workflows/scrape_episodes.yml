name: Scrape Episodes

on:
  schedule:
    # JST 火・金 21:00 = UTC 火・金 12:00
    - cron: '0 12 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'batch/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r batch/requirements.txt

      - name: Run scraping script
        env:
          SAKUMIMI_EMAIL: ${{ secrets.SAKUMIMI_EMAIL }}
          SAKUMIMI_PASSWORD: ${{ secrets.SAKUMIMI_PASSWORD }}
        run: python batch/sakumimi_scrape.py

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- data/episode_data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate branch name
        if: steps.changes.outputs.changed == 'true'
        id: create_branch_name
        run: echo "branch_name=scrape_new_data/$(TZ='Asia/Tokyo' date +%Y%m%d%H%M%S)-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Generate PR title with date
        if: steps.changes.outputs.changed == 'true'
        id: generate_title
        run: |
          echo "pr_title=新しいエピソードデータの更新: $(TZ='Asia/Tokyo' date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Extract new episode numbers
        if: steps.changes.outputs.changed == 'true'
        id: extract_episodes
        run: |
          EPISODES=$(git diff HEAD -- data/episode_data.json | \
            grep '"episode"' | \
            grep '^+' | \
            grep -oE '#[0-9]{3}' | \
            paste -sd ',' | \
            sed 's/,/, /g' || true)
          echo "episodes=$EPISODES" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.create_branch_name.outputs.branch_name }}
          base: main
          commit-message: "chore: update new episode data via scraper"
          add-paths: data/episode_data.json
          title: ${{ steps.generate_title.outputs.pr_title }}
          body: |
            新しく追加されたエピソード：
            ${{ steps.extract_episodes.outputs.episodes }}
